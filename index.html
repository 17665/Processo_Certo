<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Assistente Jurídico</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 720px; margin: 40px auto; padding: 0 16px; }
  textarea { width: 100%; padding: 10px; box-sizing: border-box; font-size: 1rem; min-height: 80px; }
  button { margin-top: 12px; padding: 10px 20px; cursor: pointer; }
  #login-msg, #status-msg { margin-top: 10px; font-weight: bold; }
  #app { display: none; }
  .citacao-card {
    border: 1px solid #ccc; border-radius: 8px; padding: 14px; margin-top: 14px;
  }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold;
  }
  .badge-verificado { background: #d4edda; color: #155724; }
  .badge-bloqueado { background: #f8d7da; color: #721c24; }
  .aviso-simulado {
    background: #fff3cd; border: 1px solid #ffe69c; padding: 10px; border-radius: 6px; margin-bottom: 16px;
  }
</style>
</head>
<body>

<div id="login">
  <h1>Entrar</h1>
  <form id="form-login">
    <label for="login-email">E-mail</label><br/>
    <input id="login-email" type="email" required /><br/>
    <label for="login-senha">Senha</label><br/>
    <input id="login-senha" type="password" required />
    <br/>
    <button type="submit">Entrar</button>
  </form>
  <p id="login-msg"></p>
</div>

<div id="app">
  <h1>Assistente Jurídico</h1>

  <div class="aviso-simulado">
  ℹ️ <strong>IA conectada:</strong> as citações abaixo vêm de busca real.
  O selo "Verificado" só aparece quando a fonte é oficial (.jus.br) e respondeu
  de verdade na checagem — qualquer outra coisa fica marcada como "Não confirmado".
</div>

  <label for="pergunta">Sobre o que você quer pesquisar jurisprudência?</label>
  <textarea id="pergunta" placeholder="Ex: dano moral por negativação indevida após pagamento"></textarea>
  <br/>
  <button id="btn-buscar">Buscar jurisprudência</button>

  <p id="status-msg"></p>

  <div id="resultados"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAmieTrhDtNmyxw3X-2ByiI3siPAMbXf5w",
    authDomain: "processocerto-8f713.firebaseapp.com",
    projectId: "processocerto-8f713",
    storageBucket: "processocerto-8f713.firebasestorage.app",
    messagingSenderId: "702032107490",
    appId: "1:702032107490:web:73d37f4a608f60bacb8bbb",
  };

  // Troque por sua URL real depois que a função "buscarJurisprudencia" for publicada.
  const URL_FUNCAO_BUSCA = "https://buscar-jurisprudencia-702032107490.southamerica-east1.run.app";

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  document.getElementById("form-login").addEventListener("submit", async (evento) => {
    evento.preventDefault();
    const loginMsg = document.getElementById("login-msg");
    try {
      await signInWithEmailAndPassword(
        auth,
        document.getElementById("login-email").value,
        document.getElementById("login-senha").value
      );
    } catch (erro) {
      loginMsg.textContent = "Erro: " + erro.code;
      loginMsg.style.color = "red";
    }
  });

  onAuthStateChanged(auth, (usuario) => {
    document.getElementById("login").style.display = usuario ? "none" : "block";
    document.getElementById("app").style.display = usuario ? "block" : "none";
  });

  document.getElementById("btn-buscar").addEventListener("click", async () => {
    const pergunta = document.getElementById("pergunta").value.trim();
    const statusMsg = document.getElementById("status-msg");
    const resultados = document.getElementById("resultados");

    if (!pergunta) {
      statusMsg.textContent = "Digite uma pergunta primeiro.";
      statusMsg.style.color = "red";
      return;
    }

    statusMsg.textContent = "Buscando...";
    statusMsg.style.color = "black";
    resultados.innerHTML = "";

    try {
      const resposta = await fetch(URL_FUNCAO_BUSCA, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pergunta, advogado_id: auth.currentUser.uid }),
      });

      const dados = await resposta.json();
      statusMsg.textContent = "";

      dados.citacoes.forEach((c) => {
        const card = document.createElement("div");
        card.className = "citacao-card";
        const badge = c.verificado
          ? `<span class="badge badge-verificado">Verificado</span>`
          : `<span class="badge badge-bloqueado">Não confirmado</span>`;
        card.innerHTML = `
          ${badge}
          <p>${c.texto_citado}</p>
          <p><strong>${c.tribunal}</strong>${c.numero_processo_referenciado ? ` — Processo ${c.numero_processo_referenciado}` : ""}</p>
          <p><a href="${c.link_fonte}" target="_blank">Ver fonte original</a></p>
        `;
        resultados.appendChild(card);
      });
    } catch (erro) {
      console.error(erro);
      statusMsg.textContent = "Erro ao buscar. Veja o console do navegador.";
      statusMsg.style.color = "red";
    }
  });
</script>

</body>
</html>
